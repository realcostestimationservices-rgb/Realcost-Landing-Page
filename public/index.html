<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>

    (function () {
      var doc = document.documentElement;
      var layoutWidth = doc.clientWidth || window.innerWidth || 0;
      var screenWidth = (window.screen && window.screen.width) || 0;
      var isTouch = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;

      if (!isTouch || !screenWidth) return;
      if (layoutWidth <= 900 || layoutWidth <= screenWidth * 1.3) return;

      var meta = document.querySelector('meta[name="viewport"]');
      if (meta) meta.setAttribute('content', 'width=device-width, initial-scale=1.0');
    })();
  </script>
  <meta name="theme-color" content="#112646" />
